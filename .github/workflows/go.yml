# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build
      run: go build -v ./cmd/sfflt_lang.go

    - name: Test
      run: go test -v ./...

    - name: Download fflt_lang binary
      run: |
        curl -L -o fflt_lang.tar.gz https://github.com/simomu-github/fflt_lang/releases/latest/download/fflt_lang_linux_amd64.tar.gz
        tar -xzf fflt_lang.tar.gz
        chmod +x fflt_lang_linux_amd64/fflt_lang
        echo "FFLT_LANG=$(pwd)/fflt_lang_linux_amd64/fflt_lang" >> $GITHUB_ENV

    - name: Integration test
      run: ./tests/run_integration_test.sh
